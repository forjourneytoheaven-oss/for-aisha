<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Chat 💬</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

.chat {
    height: 85vh;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 10px;
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 70%;
}

.me { background: #ff4d6d; margin-left: auto; }
.other { background: #333; }

.input-box {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
}

input {
    flex: 1;
    padding: 15px;
    border: none;
}

button {
    padding: 15px;
    border: none;
    background: #ff4d6d;
    color: white;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-box">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
// 🔥 CONFIG (isi dari Firebase nanti)
const firebaseConfig = {
  apiKey: "AIzaSyAyVU9uwtZmugQuQOSz_4Bph3SR46O4Xqs",
  authDomain: "dawn-38a84.firebaseapp.com",
  databaseURL: "https://dawn-38a84-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dawn-38a84",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔑 ROOM
const room = prompt("Masukin kode room (contoh: aisha123)");
const username = prompt("Nama kamu:");

function send() {
    let text = document.getElementById("msg").value;
    if (!text) return;

    db.ref("chat/" + room).push({
        name: username,
        text: text
    });

    document.getElementById("msg").value = "";
}

db.ref("chat/" + room).on("child_added", snap => {
    let data = snap.val();

    let div = document.createElement("div");
    div.className = "msg " + (data.name === username ? "me" : "other");
    div.innerText = data.name + ": " + data.text;

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 9999;
});
</script>

</body>
</html>
